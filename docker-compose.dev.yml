# Development Docker Compose Override
# This file adds volume mounts and dev mode settings for auto-reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Features:
# - Mounts source code directories for hot-reload
# - Uses nodemon (npm run dev) instead of node (npm start)
# - Sets NODE_ENV=development
# - Uses global .env file from project root

version: '3.8'

services:
  # Auth Service - Development Mode (nodemon for hot-reload)
  auth-service:
    environment:
      - SEED_DEV=true
      - EMAIL_DEV_REDIRECT_TO=${EMAIL_DEV_REDIRECT_TO:-}
    volumes:
      - ./backend/services/auth-service/src:/app/src
      - ./.env:/app/.env
    command: npm run dev

  # Business Service - Development Mode (nodemon for hot-reload)
  business-service:
    environment:
      - SEED_FEE_CONFIGURATION=true
      - LOB_MODEL_SERVICE_URL=http://lob-model:5050
    volumes:
      - ./backend/shared:/backend/shared:ro
      - ./backend/services/business-service/src:/backend/services/business-service/src
      - ./ai/datasets:/backend/ai/datasets:ro
      - ./ai/datasets:/ai/datasets:ro
      - ./.env:/backend/services/business-service/.env
    command: npm run dev

  # Admin Service - Development Mode (nodemon for hot-reload)
  admin-service:
    environment:
      - SEED_FORM_DEFINITIONS=true
    volumes:
      - ./backend/shared:/backend/shared:ro
      - ./backend/services/admin-service/src:/backend/services/admin-service/src
      - ./.env:/backend/services/admin-service/.env
    command: npm run dev

  # Audit Service - Development Mode (nodemon for hot-reload)
  audit-service:
    volumes:
      - ./backend/services/audit-service/src:/app/src
      - ./.env:/app/.env
    command: npm run dev

  # LOB Model - dev: persist models and datasets on host so retraining from Admin UI is kept
  lob-model:
    environment:
      - LOB_RETRAIN_ON_START=${LOB_RETRAIN_ON_START:-0}
    volumes:
      - ./ai/models:/app/models
      - ./ai/datasets:/app/datasets