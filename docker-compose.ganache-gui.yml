# Use Ganache GUI instead of Docker Ganache
# Usage: ./start.sh --ganache-gui (or --dev --ganache-gui)
# Before starting: open Ganache GUI, use Quick Start or a workspace on port 7545.
# Set DEPLOYER_PRIVATE_KEY in .env to Account 0's private key from the GUI (click key icon next to first account).
# The app will connect to http://host.docker.internal:7545 (GUI). Base compose waits for RPC via GANACHE_HOST/GANACHE_PORT.

services:
  ganache:
    deploy:
      replicas: 0

  deploy-contracts:
    environment:
      - GANACHE_HOST=host.docker.internal
      - GANACHE_PORT=7545
      - GANACHE_RPC_URL=http://host.docker.internal:7545
      - DEPLOYER_PRIVATE_KEY=${DEPLOYER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Use repo's truffle-config and contracts so evmVersion Berlin is used without rebuilding image
      - ./blockchain/truffle-config.js:/app/truffle-config.js:ro
      - ./blockchain/contracts:/app/contracts:ro
      - ./blockchain/migrations:/app/migrations:ro

  audit-service:
    environment:
      - GANACHE_RPC_URL=http://host.docker.internal:7545
      - CONTRACT_ABI_PATH=/app/contract-addresses
    extra_hosts:
      - "host.docker.internal:host-gateway"
